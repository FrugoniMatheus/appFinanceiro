<ion-content [fullscreen]="true"  color="light" class="center-content" [scrollY]="false">
  <ion-card >
    <ion-card-content>
        <ion-img src="../../assets/imagens/serpens.png"></ion-img>
      <ion-list>
        <ion-item>
          <ion-input  fill="outline" type="text" placeholder="Nome">
            <ion-icon slot="start" name="people-outline" size="large"></ion-icon>
          </ion-input>
        </ion-item>
        <br>
        <ion-item>
          <ion-input fill="outline" type="password" placeholder="Senha">
            <ion-icon slot="start" name="key-outline" size="large"></ion-icon>
          </ion-input>
        </ion-item>
      </ion-list>
      <ion-button expand="block" (click)="avancar()">Avançar</ion-button>
    </ion-card-content>
  </ion-card>

</ion-content>
