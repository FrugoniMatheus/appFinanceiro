<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>cadastro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-list>
      <ion-item>
        <ion-input label="Nome" placeholder="Digite o nome" [(ngModel)]="nome"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Endereço" placeholder="Digite o endereço" [(ngModel)]="endereco"></ion-input>
      </ion-item>
      <ion-item>
        <ion-select [(ngModel)]="tipo" label="Tipo">
          <ion-select-option value="RECEBER">Receber</ion-select-option>
          <ion-select-option value="PAGAR">Pagar</ion-select-option>
        </ion-select>
      </ion-item>
    </ion-list>
    <ion-button expand="block" color="success" (click)="cadastrar()">Cadastrar</ion-button>
    <ion-button expand="block" color="danger" (click)="limparFormulario()">Limpar Formulário</ion-button>
  </ion-card>
  <ion-card>
    <ion-list>
      <ion-item *ngFor="let item of listaCadastros; let i = index">
        <ion-label>
          <h2>{{ item.nome }}</h2>
          <p>{{ item.endereco }}</p>
          <p><strong>{{ item.tipo }}</strong></p>
        </ion-label>
        <ion-icon slot="end" color="danger"  name="close-circle-outline" size="large" (click)="excluir(i)"></ion-icon>
      </ion-item>
    </ion-list>
  </ion-card>
</ion-content>
